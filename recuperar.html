<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubbyCake - Recuperar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="resources/style.css">
</head>
<body>

    <header>
        <!-- Header idéntico a index.html -->
    </header>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
            <div class="col-12 col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg p-4 anim-hidden fade-up" style="border-radius: 20px; background-color: var(--brand-pink);">
                    <div class="text-center mb-4">
                        <i class="fas fa-lock-open fa-3x text-white mb-3"></i>
                        <h2 class="text-uppercase" style="color: var(--brand-red);">Recuperar</h2>
                        <p class="small fw-bold" style="color: #333;">Introduce tu correo y te enviaremos instrucciones.</p>
                    </div>

                    <form onsubmit="event.preventDefault(); sendRecovery();">
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-dark">CORREO ELECTRÓNICO</label>
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control bg-white border-start-0 ps-0" placeholder="ejemplo@correo.com" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-salmon-login w-100 shadow-sm pt-2 fw-bold">ENVIAR CORREO</button>
                        </div>

                        <div class="text-center mt-4 pt-3 border-top border-white">
                            <a href="login.html" class="text-dark fw-bold text-decoration-none mt-2 d-inline-block hover-link">
                                <i class="fas fa-arrow-left me-1"></i> Regresar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer idéntico a index.html -->
</body>
</html>
