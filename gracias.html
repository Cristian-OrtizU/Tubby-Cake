<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubbyCake - ¡Gracias!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="resources/style.css">
</head>
<body>

    <div class="container mt-5 text-center">
        <div class="row justify-content-center anim-hidden fade-up">
            <div class="col-md-8">
                
                <!-- Icono de Éxito -->
                <div class="mb-4">
                    <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center shadow" style="width: 100px; height: 100px;">
                        <i class="fas fa-check fa-4x"></i>
                    </div>
                </div>

                <h1 style="color: var(--brand-red);">¡GRACIAS POR TU COMPRA!</h1>
                <p class="lead mb-5">Tu pedido ha sido confirmado y estamos horneando felicidad para ti.</p>

                <!-- Resumen de la Orden -->
                <div class="card border-0 shadow-sm text-start p-4 mb-5" style="background-color: #fffbf0; border-radius: 20px;">
                    <h4 style="color: var(--brand-salmon); border-bottom: 2px solid var(--brand-pink); padding-bottom: 10px;">
                        RESUMEN DEL PEDIDO <span id="order-id" class="float-end fs-6 text-muted"></span>
                    </h4>
                    
                    <div class="mt-3">
                        <p><strong>Enviado a:</strong> <span id="order-name"></span></p>
                        <p><strong>Dirección:</strong> <span id="order-address"></span></p>
                    </div>

                    <div class="table-responsive mt-3">
                        <table class="table table-borderless">
                            <tbody id="order-items">
                                <!-- Aquí se llenan los productos con JS -->
                            </tbody>
                            <tfoot class="border-top">
                                <tr>
                                    <td class="fw-bold fs-5 text-end">TOTAL PAGADO:</td>
                                    <td class="fw-bold fs-5 text-success text-end" id="order-total"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>

                <a href="index.html" class="btn btn-tubby btn-lg shadow mb-5">VOLVER AL INICIO</a>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                document.querySelectorAll('.anim-hidden').forEach(el => el.classList.add('active'));
            }, 100);

            // Recuperar la orden guardada
            const order = JSON.parse(localStorage.getItem('lastOrder'));

            if (order) {
                document.getElementById('order-id').innerText = '#' + order.id;
                document.getElementById('order-name').innerText = order.customer.name;
                document.getElementById('order-address').innerText = order.customer.address + ', ' + order.customer.city;
                document.getElementById('order-total').innerText = order.total;

                const itemsContainer = document.getElementById('order-items');
                order.items.forEach(item => {
                    itemsContainer.innerHTML += `
                        <tr>
                            <td>${item.cantidad}x ${item.nombre}</td>
                            <td class="text-end">$${(item.precio * item.cantidad).toFixed(2)}</td>
                        </tr>
                    `;
                });
            } else {
                // Si no hay orden, volver al inicio
               // window.location.href = "index.html";
            }
        });
    </script>

</body>
</html>
