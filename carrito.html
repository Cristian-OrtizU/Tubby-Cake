<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubbyCake - Mi Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="resources/style.css">
</head>
<body>

    <!-- HEADER RESPONSIVO -->
    <header>
        <div class="header-top">
            <div class="container d-flex justify-content-between align-items-center header-flex-mobile">
                <div class="d-flex align-items-center justify-content-center logo-container-mobile">
                     <div class="bg-white rounded-circle p-2 shadow-sm">
                        <a href="index.html" class="d-flex align-items-center text-decoration-none">
                            <div class="bg-white rounded-circle p-1 shadow-sm header-logo-anim">
                               <img src="resources/images/logo.png" alt="Logo" class="img-fluid" style="width: 30px; height: 45px;">
                            </div>
                       </a>
                     </div>
                </div>
                <h1 class="m-0 brand-title text-center">TUBBYCAKE</h1>
                <div class="text-end user-actions-mobile">
                    <a href="login.html" class="btn-icon-header d-inline-block mx-2 text-center user-btn-target">
                        <i class="far fa-user fs-5"></i><br>USUARIO
                    </a>
                    <div class="d-inline-block mx-2 text-center cursor-pointer">
                        <a href="carrito.html" class="btn-icon-header d-inline-block mx-2 text-center">
                            <i class="fas fa-shopping-cart fs-5"></i><br>CARRITO <span id="cart-count-number"></span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <nav class="navbar navbar-expand-lg navbar-custom justify-content-center shadow-sm">
            <div class="container-fluid justify-content-center">
                <button class="navbar-toggler w-100 border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="fas fa-bars text-danger fs-2"></span> <span class="ms-2 fw-bold text-danger">MENÚ</span>
                </button>
                <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                    <div class="navbar-nav text-center mt-3 mt-lg-0">
                        <a class="nav-link" href="menu.html">VOLVER AL MENÚ</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- CONTENIDO CARRITO -->
    <div class="container mt-5 mb-5" style="min-height: 60vh;">
        <h2 class="text-center mb-4 anim-hidden fade-up">TU CARRITO DE COMPRAS</h2>
        
        <div class="row justify-content-center anim-hidden fade-up">
            <div class="col-lg-8 col-12">
                <div class="card shadow-sm border-0 p-4">
                    
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Producto</th>
                                    <th>Precio</th>
                                    <th>Cantidad</th>
                                    <th>Subtotal</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="cart-items-container"></tbody>
                        </table>
                    </div>

                    <div id="empty-cart-msg" class="text-center py-4" style="display: none;">
                        <i class="fas fa-shopping-basket fa-3x text-muted mb-3"></i>
                        <p class="fw-bold text-muted">Tu carrito está vacío.</p>
                        <a href="menu.html" class="btn btn-tubby mt-2">IR A COMPRAR</a>
                    </div>

                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-4 pt-3 border-top" id="cart-footer">
                        <h3 class="m-0 mb-3 mb-md-0">TOTAL: $<span id="cart-total">0</span></h3>
                        <div>
                            <button class="btn btn-outline-danger me-2 fw-bold" onclick="clearCart()">VACIAR</button>
                            <button class="btn btn-tubby" onclick="window.location.href='pago.html'">PAGAR AHORA</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER RESPONSIVO -->
    <footer>
        <div class="container text-center">
            <h5 class="mb-3 fw-bold footer-text">SIGUENOS EN NUESTRAS REDES SOCIALES</h5>
            <div class="row align-items-center mb-2">
                <div class="col-12 col-md-4 text-md-start ps-md-5 mb-3 mb-md-0 footer-col">
                    <div class="d-flex gap-3 justify-content-center justify-content-md-start social-container">
                        <a href="https://www.facebook.com/profile.php?id=61583938794867" target="_blank" class="text-decoration-none"><i class="fab fa-facebook text-primary fa-2x social-icon"></i></a>
                        <a href="https://www.tiktok.com/@tubbycake0" target="_blank" class="text-decoration-none"><i class="fab fa-tiktok text-dark fa-2x social-icon"></i></a>
                        <a href="https://www.instagram.com/tubby.cake?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="text-decoration-none"><i class="fab fa-instagram text-danger fa-2x social-icon"></i></a>
                    </div>
                </div>
                <div class="col-12 col-md-4 my-2 footer-col">
                    <div class="footer-logo shadow-sm d-flex align-items-center justify-content-center mx-auto">
                        <i class="fas fa-cupcake fa-2x" style="color: var(--brand-salmon);"></i>
                         <img src="resources/images/logo.png" alt="Logo" class="img-fluid logo-footer-img" style="width: 40px; height: 55px;">
                    </div>
                    <h5>TUBBYCAKE</h5>
                </div>
                <div class="col-12 col-md-4 text-center text-md-end footer-col">
                    <div class="footer-text fw-bold links-container">
                        <a href="nosotros.html" class="text-dark text-decoration-none mx-2">NOSOTROS</a>
                        <a href="terminos.html" class="text-dark text-decoration-none mx-2">TERMINOS</a>
                    </div>
                </div>
            </div>
            <div class="small fw-bold border-top pt-2 border-dark-subtle footer-text">
                © 2025 TUBBY CAKE.
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SCRIPT CARRITO -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderCartPage();
            updateHeaderCount();
            setTimeout(() => { document.querySelectorAll('.anim-hidden').forEach(el => el.classList.add('active')); }, 100);
            
            // Header Usuario
            const userStored = localStorage.getItem('tubbyUser');
            const userBtnLink = document.querySelector('.user-btn-target') || document.querySelector('.fa-user').closest('a'); 
            if (userStored && userBtnLink) {
                const userData = JSON.parse(userStored);
                userBtnLink.removeAttribute('href'); 
                userBtnLink.classList.add('user-menu-container'); 
                userBtnLink.innerHTML = `
                    <div onclick="toggleUserMenu()" style="cursor: pointer;">
                        <i class="far fa-user fs-5 text-success"></i><br>
                        <span style="font-size: 0.7rem; color: var(--brand-cafe);">HOLA, ${userData.name.toUpperCase()}</span>
                    </div>
                    <div class="user-dropdown-menu" id="userDropdown">
                        <button class="btn btn-logout fw-bold" onclick="logoutAction()">CERRAR SESIÓN</button>
                    </div>`;
            }
        });

        function toggleUserMenu() {
            const menu = document.getElementById('userDropdown');
            if(menu) menu.classList.toggle('show');
        }

        function logoutAction() {
            localStorage.removeItem('tubbyUser');
            window.location.reload();
        }

        function renderCartPage() {
            const cart = JSON.parse(localStorage.getItem('tubbyCart')) || [];
            const container = document.getElementById('cart-items-container');
            const emptyMsg = document.getElementById('empty-cart-msg');
            const footer = document.getElementById('cart-footer');
            const totalSpan = document.getElementById('cart-total');

            container.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                emptyMsg.style.display = 'block';
                if(footer) footer.style.display = 'none';
                return;
            } 

            emptyMsg.style.display = 'none';
            if(footer) footer.style.display = 'flex';

            cart.forEach((item, index) => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                const row = `
                    <tr>
                        <td class="fw-bold"><span class="ms-2 text-uppercase">${item.nombre}</span></td>
                        <td>$${item.precio}</td>
                        <td>
                            <div class="d-flex align-items-center">
                                <button class="btn btn-sm btn-light border fw-bold" onclick="changeQty(${index}, -1)">-</button>
                                <span class="mx-2 fw-bold">${item.cantidad}</span>
                                <button class="btn btn-sm btn-light border fw-bold" onclick="changeQty(${index}, 1)">+</button>
                            </div>
                        </td>
                        <td class="fw-bold text-success">$${subtotal}</td>
                        <td><button class="btn btn-sm text-danger" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
                container.innerHTML += row;
            });
            if(totalSpan) totalSpan.innerText = total;
        }

        window.changeQty = function(index, change) {
            let cart = JSON.parse(localStorage.getItem('tubbyCart')) || [];
            cart[index].cantidad += change;
            if (cart[index].cantidad <= 0) cart.splice(index, 1);
            saveAndRender(cart);
        };

        window.removeItem = function(index) {
            let cart = JSON.parse(localStorage.getItem('tubbyCart')) || [];
            cart.splice(index, 1);
            saveAndRender(cart);
        };

        window.clearCart = function() {
            showTubbyModal("¿Vaciar Carrito?", "¿Estás seguro? Se irán todos tus dulces... 🥺", () => { 
                localStorage.removeItem('tubbyCart'); renderCartPage(); updateHeaderCount(); 
            });
        };

        function saveAndRender(cart) {
            localStorage.setItem('tubbyCart', JSON.stringify(cart));
            renderCartPage();
            updateHeaderCount();
        }

        function updateHeaderCount() {
            const cart = JSON.parse(localStorage.getItem('tubbyCart')) || [];
            const countSpan = document.getElementById('cart-count-number');
            if (countSpan) countSpan.innerText = cart.reduce((acc, item) => acc + item.cantidad, 0) || '';
        }

        function showTubbyModal(title, text, onConfirm) {
            const overlay = document.createElement('div');
            overlay.className = 'tubby-overlay';
            overlay.innerHTML = `
                <div class="tubby-modal">
                    <i class="fas fa-cupcake fa-3x mb-3" style="color: var(--brand-salmon)"></i>
                    <h3>${title}</h3><p>${text}</p>
                    <div class="tubby-modal-btns">
                        <button class="btn btn-outline-secondary" id="cancelBtn">Cancelar</button>
                        <button class="btn btn-tubby" id="confirmBtn">Sí, confirmar</button>
                    </div>
                </div>`;
            document.body.appendChild(overlay);
            document.getElementById('confirmBtn').onclick = () => { onConfirm(); overlay.remove(); };
            document.getElementById('cancelBtn').onclick = () => overlay.remove();
        }
        
        window.onclick = function(event) {
            if (!event.target.closest('.user-menu-container')) {
                const dropdowns = document.getElementsByClassName("user-dropdown-menu");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
                }
            }
        }
    </script>
</body>
</html>
