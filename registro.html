    <div class="container mt-5 mb-5">
        <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
            <div class="col-12 col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg p-4 anim-hidden fade-up" style="border-radius: 20px; background-color: var(--brand-pink);">
                    <div class="text-center mb-4">
                        <h2 class="text-uppercase" style="color: var(--brand-red);">Crear Cuenta</h2>
                        <p class="small fw-bold" style="color: #333;">¡ÚNETE A LA FAMILIA TUBBY!</p>
                    </div>

                    <form onsubmit="event.preventDefault(); registerUser();">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-dark">NOMBRE COMPLETO</label>
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-user text-muted"></i></span>
                                <input type="text" id="regName" class="form-control bg-white border-start-0 ps-0" placeholder="Tu nombre" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-dark">CORREO ELECTRÓNICO</label>
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" id="regEmail" class="form-control bg-white border-start-0 ps-0" placeholder="ejemplo@correo.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-dark">CONTRASEÑA</label>
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" id="regPass" class="form-control bg-white border-start-0 ps-0" placeholder="********" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-dark">CONFIRMAR CONTRASEÑA</label>
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" id="regPassConfirm" class="form-control bg-white border-start-0 ps-0" placeholder="********" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-salmon-login w-100 shadow-sm pt-2 fw-bold">CREAR CUENTA</button>
                        </div>

                        <div class="text-center mt-4 pt-3 border-top border-white">
                            <span class="small fw-bold text-dark">¿Ya tienes cuenta?</span><br>
                            <a href="login.html" class="text-danger fw-bold text-decoration-none mt-2 d-inline-block bg-white px-3 py-1 rounded-pill shadow-sm" style="font-size: 0.8rem;">INICIAR SESIÓN</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer>

                        <a href="https://www.facebook.com/profile.php?id=61583938794867" target="_blank" class="text-decoration-none"><i class="fab fa-facebook text-primary fa-2x social-icon"></i></a>
                        <a href="https://www.tiktok.com/@tubbycake0" target="_blank" class="text-decoration-none"><i class="fab fa-tiktok text-dark fa-2x social-icon"></i></a>
                        <a href="https://www.instagram.com/tubby.cake?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="text-decoration-none"><i class="fab fa-instagram text-danger fa-2x social-icon"></i></a>
                    </div>
                </div>
                <div class="col-12 col-md-4 my-2 footer-col">
                    <div class="footer-logo shadow-sm d-flex align-items-center justify-content-center mx-auto">
                        <i class="fas fa-cupcake fa-2x" style="color: var(--brand-salmon);"></i>
                         <img src="resources/images/logo.png" alt="Logo" class="img-fluid logo-footer-img" style="width: 40px; height: 55px;">
                    </div>
                    <h5>TUBBYCAKE</h5>
                </div>
                <div class="col-12 col-md-4 text-center text-md-end footer-col">
                    <div class="footer-text fw-bold links-container">
                        <a href="nosotros.html" class="text-dark text-decoration-none mx-2">NOSOTROS</a>
                        <a href="terminos.html" class="text-dark text-decoration-none mx-2">TERMINOS</a>
                    </div>
                </div>
            </div>
            <div class="small fw-bold border-top pt-2 border-dark-subtle footer-text">
                © 2025 TUBBY CAKE.
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => { document.querySelectorAll('.anim-hidden').forEach(el => el.classList.add('active')); }, 100);
            const cart = JSON.parse(localStorage.getItem('tubbyCart')) || [];
            const countSpan = document.getElementById('cart-count-number');
            if (countSpan) countSpan.innerText = cart.reduce((acc, item) => acc + item.cantidad, 0) || '';
        });

        function registerUser() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const passConfirm = document.getElementById('regPassConfirm').value;

            if (!name || !email || !pass) { showTubbyMessage('¡Cuidado!', 'Faltan datos.', 'warning'); return; }
            if (pass !== passConfirm) { showTubbyMessage('¡Oh no!', 'Contraseñas no coinciden.', 'error'); return; }

            let usersDB = JSON.parse(localStorage.getItem('tubbyUsersDB')) || [];
            if (usersDB.find(user => user.email === email)) {
                showTubbyMessage('Lo sentimos', 'Correo ya registrado.', 'error'); return;
            }

            const newUser = { name: name, email: email, pass: pass };
            usersDB.push(newUser);
            localStorage.setItem('tubbyUsersDB', JSON.stringify(usersDB));
            localStorage.setItem('tubbyUser', JSON.stringify(newUser));

            showTubbyMessage('¡Yupi!', `Cuenta creada.`, 'success', () => window.location.href = "index.html");
        }

        function showTubbyMessage(title, text, type, callback) {
            let icon = type === 'error' ? 'fa-times-circle' : 'fa-check-circle';
            const overlay = document.createElement('div');
            overlay.className = 'tubby-alert-overlay';
            overlay.innerHTML = `
                <div class="tubby-alert-card ${type}">
                    <div class="tubby-alert-icon"><i class="fas ${icon}"></i></div>
                    <div class="tubby-alert-title">${title}</div>
                    <div class="tubby-alert-text">${text}</div>
                    <button class="btn-alert-close" id="closeAlertBtn">ENTENDIDO</button>
                </div>`;
            document.body.appendChild(overlay);
            document.getElementById('closeAlertBtn').onclick = () => { overlay.remove(); if(callback) callback(); };
        }
    </script>
</body>
