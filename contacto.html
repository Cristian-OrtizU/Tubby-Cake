<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="resources/style.css">
</head>
<body>

    <header>
        <div class="header-top">
            <div class="container d-flex justify-content-between align-items-center header-flex-mobile">
                <div class="d-flex align-items-center logo-container-mobile">
                     <div class="bg-white rounded-circle p-2 shadow-sm">
                        <a href="index.html" class="d-flex align-items-center text-decoration-none">
                            <div class="bg-white rounded-circle p-1 shadow-sm header-logo-anim">
                               <img src="resources/images/logo.png" alt="Logo" class="img-fluid" style="width: 30px; height: 45px;">
                            </div>
                       </a>
                     </div>
                </div>
                <h1 class="m-0 brand-title text-center">TUBBYCAKE</h1>
                <div class="text-end user-actions-mobile">
                    <a href="login.html" class="btn-icon-header d-inline-block mx-2 text-center user-btn-target">
                        <i class="far fa-user fs-5"></i><br>USUARIO
                    </a>
                    <div class="d-inline-block mx-2 text-center cursor-pointer">
                        <a href="carrito.html" class="btn-icon-header d-inline-block mx-2 text-center">
                            <i class="fas fa-shopping-cart fs-5"></i><br>CARRITO <span id="cart-count-number"></span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <nav class="navbar navbar-expand-lg navbar-custom justify-content-center shadow-sm">
            <div class="container-fluid justify-content-center">
                <button class="navbar-toggler w-100 border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="fas fa-bars text-danger fs-2"></span> <span class="ms-2 fw-bold text-danger">MENÚ</span>
                </button>
                <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                    <div class="navbar-nav text-center mt-3 mt-lg-0">
                        <a class="nav-link" href="menu.html">PASTELES</a>
                        <a class="nav-link" href="menu.html#galletas">GALLETAS</a>
                        <a class="nav-link" href="menu.html#gelatinas">GELATINAS</a>
                        <a class="nav-link" href="menu.html#bebidas">BEBIDAS</a>
                        <a class="nav-link active" href="contacto.html">CONTACTO</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center anim-hidden fade-up">
            <div class="col-12 col-md-8 col-lg-6">
                <h2 class="text-center mb-4" style="font-size: 2.5rem;">CONTACTANOS</h2>
                
                <div class="card p-4 shadow-sm border-0" style="border-radius: 20px;">
                    <form id="contactForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">NOMBRE</label>
                            <input type="text" class="form-control" placeholder="Tu nombre completo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">CORREO</label>
                            <input type="email" class="form-control" placeholder="tucorreo@ejemplo.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">MENSAJE</label>
                            <textarea class="form-control" rows="5" placeholder="¿En qué podemos ayudarte?" required></textarea>
                        </div>
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-tubby w-100 shadow-sm">ENVIAR MENSAJE</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container text-center">
            <h5 class="mb-3 fw-bold footer-text">SIGUENOS EN NUESTRAS REDES SOCIALES</h5>
            <div class="row align-items-center mb-2">
                <div class="col-12 col-md-4 text-md-start ps-md-5 mb-3 mb-md-0 footer-col">
                    <div class="d-flex gap-3 justify-content-center justify-content-md-start social-container">
                        <a href="https://www.facebook.com/profile.php?id=61583938794867" target="_blank" class="text-decoration-none"><i class="fab fa-facebook text-primary fa-2x social-icon"></i></a>
                        <a href="https://www.tiktok.com/@tubbycake0" target="_blank" class="text-decoration-none"><i class="fab fa-tiktok text-dark fa-2x social-icon"></i></a>
                        <a href="https://www.instagram.com/tubby.cake?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="text-decoration-none"><i class="fab fa-instagram text-danger fa-2x social-icon"></i></a>
                    </div>
                </div>
                <div class="col-12 col-md-4 my-2 footer-col">
                    <div class="footer-logo shadow-sm d-flex align-items-center justify-content-center mx-auto">
                        <i class="fas fa-cupcake fa-2x" style="color: var(--brand-salmon);"></i>
                         <img src="resources/images/logo.png" alt="Logo" class="img-fluid logo-footer-img" style="width: 40px; height: 55px;">
                    </div>
                    <h5>TUBBYCAKE</h5>
                </div>
                <div class="col-12 col-md-4 text-center text-md-end footer-col">
                    <div class="footer-text fw-bold links-container">
                        <a href="nosotros.html" class="text-dark text-decoration-none mx-2">NOSOTROS</a>
                        <a href="terminos.html" class="text-dark text-decoration-none mx-2">TERMINOS</a>
                    </div>
                </div>
            </div>
            <div class="small fw-bold border-top pt-2 border-dark-subtle footer-text">
                © 2025 TUBBY CAKE.
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => { document.querySelectorAll('.anim-hidden').forEach(el => el.classList.add('active')); }, 100);
            updateHeaderCount();

            const userStored = localStorage.getItem('tubbyUser');
            const userBtnLink = document.querySelector('.user-btn-target') || document.querySelector('.fa-user').closest('a'); 
            if (userStored && userBtnLink) {
                const userData = JSON.parse(userStored);
                userBtnLink.removeAttribute('href'); 
                userBtnLink.classList.add('user-menu-container'); 
                userBtnLink.innerHTML = `
                    <div onclick="toggleUserMenu()" style="cursor: pointer;">
                        <i class="far fa-user fs-5 text-success"></i><br>
                        <span style="font-size: 0.7rem; color: var(--brand-cafe);">HOLA, ${userData.name.toUpperCase()}</span>
                    </div>
                    <div class="user-dropdown-menu" id="userDropdown">
                        <button class="btn btn-logout fw-bold" onclick="logoutAction()">CERRAR SESIÓN</button>
                    </div>`;
            }

            const contactForm = document.getElementById('contactForm');
            if(contactForm) {
                contactForm.addEventListener('submit', function(e) {
                    e.preventDefault(); 
                    showTubbyToast("¡Mensaje enviado! 💌");
                    contactForm.reset();
                });
            }
        });

        function toggleUserMenu() {
            const menu = document.getElementById('userDropdown');
            if(menu) menu.classList.toggle('show');
        }

        function logoutAction() {
            localStorage.removeItem('tubbyUser');
            window.location.reload();
        }

        function updateHeaderCount() {
            const cart = JSON.parse(localStorage.getItem('tubbyCart')) || [];
            const countSpan = document.getElementById('cart-count-number');
            if (countSpan) countSpan.innerText = cart.reduce((acc, item) => acc + item.cantidad, 0) || '';
        }

        function showTubbyToast(message) {
            const toast = document.createElement('div');
            toast.className = 'tubby-toast';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('active'), 10);
            setTimeout(() => { toast.classList.remove('active'); setTimeout(() => toast.remove(), 500); }, 3000);
        }

        window.onclick = function(event) {
            if (!event.target.closest('.user-menu-container')) {
                const dropdowns = document.getElementsByClassName("user-dropdown-menu");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
                }
            }
        }
    </script>
</body>
</html>
