    <!-- CONTENIDO LOGIN -->
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
            <div class="col-12 col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg p-4 anim-hidden fade-up" style="border-radius: 20px; background-color: var(--brand-pink);">
                    <div class="text-center mb-4">
                        <h2 class="text-uppercase" style="color: var(--brand-red);">Ingresa a tu cuenta</h2>
                        <p class="small fw-bold" style="color: #333;">¡QUÉ BUENO VERTE DE NUEVO!</p>
                    </div>

                    <form onsubmit="event.preventDefault(); loginUser();">
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-dark">CORREO ELECTRÓNICO</label>
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control bg-white border-start-0 ps-0" placeholder="ejemplo@correo.com">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-dark">CONTRASEÑA</label>
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" class="form-control bg-white border-start-0 ps-0" id="inputPassword" placeholder="********">
                                <span class="input-group-text bg-white border-start-0" style="cursor: pointer;" id="togglePassword">
                                    <i class="far fa-eye text-muted"></i>
                                </span>
                            </div>
                            <div class="text-end mt-1">
                                <a href="recuperar.html" class="small text-dark text-decoration-none fw-bold hover-link">¿Olvidaste tu contraseña?</a>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-salmon-login w-100 shadow-sm text-decoration-none text-center pt-2 fw-bold">ENTRAR</button>
                        </div>

                        <div class="text-center mt-4 pt-3 border-top border-white">
                            <span class="small fw-bold text-dark">¿No tienes cuenta?</span><br>
                            <a href="registro.html" class="text-danger fw-bold text-decoration-none mt-2 d-inline-block bg-white px-3 py-1 rounded-pill shadow-sm" style="font-size: 0.8rem;">CREAR CUENTA NUEVA</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER RESPONSIVO -->

        <div class="container text-center">

            <div class="row align-items-center mb-2">
                <div class="col-12 col-md-4 text-md-start ps-md-5 mb-3 mb-md-0 footer-col">

                        <a href="https://www.instagram.com/tubby.cake?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="text-decoration-none"><i class="fab fa-instagram text-danger fa-2x social-icon"></i></a>
                    </div>
                </div>
                <div class="col-12 col-md-4 my-2 footer-col">
                    <div class="footer-logo shadow-sm d-flex align-items-center justify-content-center mx-auto">
                        <i class="fas fa-cupcake fa-2x" style="color: var(--brand-salmon);"></i>
                         <img src="resources/images/logo.png" alt="Logo" class="img-fluid logo-footer-img" style="width: 40px; height: 55px;">
                    </div>
                    <h5>TUBBYCAKE</h5>
                </div>
                <div class="col-12 col-md-4 text-center text-md-end footer-col">
                    <div class="footer-text fw-bold links-container">
                        <a href="nosotros.html" class="text-dark text-decoration-none mx-2">NOSOTROS</a>
                        <a href="terminos.html" class="text-dark text-decoration-none mx-2">TERMINOS</a>
                    </div>
                </div>

            <div class="small fw-bold border-top pt-2 border-dark-subtle footer-text">

            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => { document.querySelectorAll('.anim-hidden').forEach(el => el.classList.add('active')); }, 100);
            
            const togglePassword = document.querySelector('#togglePassword');
            const passwordInput = document.querySelector('#inputPassword');
            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function () {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.querySelector('i').classList.toggle('fa-eye');
                    this.querySelector('i').classList.toggle('fa-eye-slash');
                });
            }
            
            const cart = JSON.parse(localStorage.getItem('tubbyCart')) || [];
            const countSpan = document.getElementById('cart-count-number');
            if (countSpan) countSpan.innerText = cart.reduce((acc, item) => acc + item.cantidad, 0) || '';
        });

        function loginUser() {
            const email = document.querySelector('input[type="email"]').value;
            const pass = document.querySelector('input[type="password"]').value;

            if(!email || !pass) { showTubbyMessage('¡Ups!', 'Faltan datos.', 'warning'); return; }

            const usersDB = JSON.parse(localStorage.getItem('tubbyUsersDB')) || [];
            const validUser = usersDB.find(user => user.email === email && user.pass === pass);

            if (validUser) {
                localStorage.setItem('tubbyUser', JSON.stringify(validUser));
                showTubbyMessage('¡Bienvenid@!', `Hola, ${validUser.name}`, 'success', () => window.location.href = "index.html");
            } else {
                if (email === "admin@tubby.com" && pass === "1234") {
                     localStorage.setItem('tubbyUser', JSON.stringify({ name: "Administrador", email: email }));
                     window.location.href = "index.html";
                } else {
                    showTubbyMessage('Error', 'Datos incorrectos.', 'error');
                }
            }
        }

        function showTubbyMessage(title, text, type, callback) {
            let icon = type === 'error' ? 'fa-times-circle' : type === 'warning' ? 'fa-exclamation-circle' : 'fa-check-circle';
            const overlay = document.createElement('div');
            overlay.className = 'tubby-alert-overlay';
            overlay.innerHTML = `
                <div class="tubby-alert-card ${type}">
                    <div class="tubby-alert-icon"><i class="fas ${icon}"></i></div>
                    <div class="tubby-alert-title">${title}</div>
                    <div class="tubby-alert-text">${text}</div>
                    <button class="btn-alert-close" id="closeAlertBtn">ENTENDIDO</button>
                </div>`;
            document.body.appendChild(overlay);
            document.getElementById('closeAlertBtn').onclick = () => { overlay.remove(); if(callback) callback(); };
        }
    </script>

</body>
